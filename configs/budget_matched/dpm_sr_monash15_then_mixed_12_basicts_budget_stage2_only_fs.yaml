      split_mode: basicts
    load_from: srd_xd_joint
    strict_load: true
    few_shot_ratio: 0.05
    freeze:
    - all
    unfreeze:
    - residual_event_encoder.*
    - diffusion_mechanism_learner.*
    - fusion_predictor.*
    - calibration_head.*
    task:
      type: StableResidualForecastingTask
      phase: joint
      model_mode: forecast
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.0
      residual_weight: 0.1
      spectral_weight: 0.0
      cross_cov_weight: 0.0
      use_revin: false
      primary_supervision_space: denormalized
      basicts_scale_logging: true
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0003
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 20
    validate_every: 1
    gradient_clip_val: 5.0
    save_best_by: val/metric/mae
    save_best: true
  - name: metr_la_ten_percent_mechanism_tuning

  cross_domain_sharded_sources:
  - LargeST_xd_part0
  - LargeST_xd_part1
  - KnowAir
  - Weather
  - ETTm1
  monash15_sources:
  - australian_electricity_demand
  - london_smart_meters
  - solar_10_minutes
  - solar_4_seconds
  - wind_farms_minutely
  - wind_4_seconds
  - weather
  - kdd_cup_2018
  - temperature_rain
  - saugeenday
  - sunspot
  - pedestrian_counts
  - kaggle_web_traffic
  - bitcoin
  - us_births
data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 8
  split:
  - 0.7
  - 0.1
  - 0.2
  scaler:
    type: standard
model:
  type: SRDSTFMBackbone
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 5
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true
pipeline:
  stages:
  - name: monash_temporal_warmup
    save_artifact: dpm_budget_monash_warmup
    reset_data: true
    data:
      type: MonashMultiDatasetWindowDataModule
      dataset_group: monash15_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: identity
      norm_mode: instance_standard
    epochs: 4
    freeze:
    - all
    unfreeze:
    - stable_trunk.*
    task:
      type: StableResidualForecastingTask
      phase: stable
      model_mode: stable_pretrain
      primary_supervision_space: normalized
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
    losses:
    - type: mae
      weight: 1.0
      name: norm_mae
    - type: mse
      weight: 0.05
      name: norm_mse
    metrics:
    - type: mae
      name: norm_mae
    - type: rmse
      name: norm_rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: cross_domain_stable_trunk_pretraining
    load_from: ${env:MONASH_STAGE0_CKPT,dpm_budget_monash_warmup}
    load_method: stable_trunk_channel_inflate
    strict_load: false
    save_artifact: srd_xd_stable
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 4
    freeze:
    - all
    unfreeze:
    - stable_trunk.*
    task:
      type: StableResidualForecastingTask
      phase: stable
      model_mode: stable_pretrain
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: cross_domain_residual_diffusion_pretraining
    save_artifact: srd_xd_diffusion
    load_from: srd_xd_stable
    strict_load: true
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 4
    freeze:
    - all
    unfreeze:
    - residual_event_encoder.*
    - diffusion_mechanism_learner.*
    task:
      type: StableResidualForecastingTask
      phase: diffusion
      model_mode: diffusion_pretrain
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0008
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: cross_domain_joint_refinement
    save_artifact: srd_xd_joint
    load_from: srd_xd_diffusion
    strict_load: true
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule

# ZED-FA (Factorized Adaptation): few-shot target prompt + spatial adapter + affine calib.
# Few-shot stages use few_shot.load_from_zero_shot + trainer artifact ``zed_zero_shot`` (materialized
# after joint pretrain) and load_method ``load_zed_zero_shot_backbone`` (FA modules stay fresh-init).
# Effective freeze: stable_trunk, source experts (adapters+shared diffusion), event encoder
# stay frozen (freeze: [all] minus FA/router/gate/router_feat_adapter/fewshot_adapter).

# --- ALL-IN-ONE ---
# Monash warmup -> XD pretrain/joint -> traffic zero-shot evals -> 5%% + 10%% FA mechanism.
# Single command: basicstfm train configs/budget_matched/dpm_srpp_zed_fa_few_shot_monash15_then_mixed_12.yaml

experiment_name: dpm_srpp_zed_fa_few_shot_monash15_then_mixed_12
experiment:
  protocol: few_shot
seed: 42
trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/dpm_srpp_zed_fa_few_shot_monash15_then_mixed_12
  log_every: 50
dataset_registry:
  LargeST_xd_part0:
    name: LargeST_xd_part0
    data_path: data/LargeST_xd_part0/data.npz
    graph_path: data/LargeST_xd_part0/adj.npz
    batch_size: 4
  LargeST_xd_part1:
    name: LargeST_xd_part1
    data_path: data/LargeST_xd_part1/data.npz
    graph_path: data/LargeST_xd_part1/adj.npz
    batch_size: 4
  KnowAir:
    name: KnowAir
    data_path: data/KnowAir/data.npz
    graph_path: data/KnowAir/adj.npz
    batch_size: 4
  Weather:

    batch_size: 4
  kaggle_web_traffic:
    name: kaggle_web_traffic
    monash_root: data/Monash15/kaggle_web_traffic
    batch_size: 4
  bitcoin:
    name: bitcoin
    monash_root: data/Monash15/bitcoin

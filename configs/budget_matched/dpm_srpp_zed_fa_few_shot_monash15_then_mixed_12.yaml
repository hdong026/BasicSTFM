dataset_groups:
  cross_domain_sharded_sources:
  - LargeST_xd_part0
  - LargeST_xd_part1
  - KnowAir
  - Weather
  - ETTm1
  monash15_sources:
  - australian_electricity_demand
  - london_smart_meters
  - solar_10_minutes
  - solar_4_seconds
  - wind_farms_minutely
  - wind_4_seconds
  - weather
  - kdd_cup_2018
  - temperature_rain
  - saugeenday
  - sunspot
  - pedestrian_counts
  - kaggle_web_traffic
  - bitcoin
  - us_births
data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 8
  split:
  - 0.7
  - 0.1
  - 0.2
  scaler:
    type: standard
model:
  type: SRDSTFMBackboneZED
  name: DPM_SRPP_ZED_FA
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 5
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true
  use_persistence_anchor: true
  stage1:
    freeze: true
    load_checkpoint: ${env:ZED_STAGE1_CKPT,optional_path_to_stage1.pt}
  stage2:
    expert_bank: true
    expert_source: source_domains
    expert_domains:
    - LargeST_xd_part0
    - LargeST_xd_part1
    - KnowAir
    - Weather
    - ETTm1
    routing_key: auto
    head_mode: adapter
    num_experts: auto
    share_event_abstraction: true
    share_diffusion_base: true
    zero_shot_router: true
    router_inputs:
    - graph_signature
    - temporal_statistics
    - residual_event_signature
    router_type: softmax_mlp
    top_k_experts: 3
    per_dataset_fusion_gate: false
    router_fusion_gate: true
    fallback_head: mixture
    fusion_gate_init: 0.1
    adapter_bottleneck: 32
    adapter_scale: 0.25
    enable_fewshot_adapter: true
  few_shot:
    load_from_zero_shot: true
    adaptation_mode: factorized_adapter
    enable_factorized_adaptation: true
    train_target_prompt: true
    target_prompt_dim: 64
    max_target_prompt_datasets: 64
    target_spatial_adapter: true
    spatial_adapter_bottleneck_ratio: 8
    spatial_adapter_scale: 0.25
    affine_calibration: true
    calibration:
      mode: node_channel
      init_alpha: 1.0
      init_beta: 0.0
      node_channel_param_cap: 4096
    router_offset: true
    adaptation_mode: router_gate_adapter
    train_router: true
    train_fusion_gate: true
    train_router_feat_adapter: true
    train_target_adapter: true
    train_full_target_diffusion: false
    few_shot_mode: calibration
    anchor_to_zero_shot: true
    zed_fa_loss: true
    loss:
      lambda_final: 1.0
      lambda_residual: 0.1
      lambda_anchor: 0.05
      lambda_adapter_reg: 0.0001
    lambda_gate: 0.0
    few_shot_epochs: 5
    few_shot_lr: 0.0001
pipeline:
  stages:
  - name: monash_temporal_warmup
    save_artifact: dpm_budget_monash_warmup
    reset_data: true
    data:
      type: MonashMultiDatasetWindowDataModule
      dataset_group: monash15_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: identity
      norm_mode: instance_standard
    epochs: 4
    freeze:
    - all
    unfreeze:
    - stable_trunk.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: stable
      model_mode: stable_pretrain
      primary_supervision_space: normalized
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
      log_zed_metrics: true
    losses:
    - type: mae
      weight: 1.0
      name: norm_mae
    - type: mse
      weight: 0.05
      name: norm_mse
    metrics:
    - type: mae
      name: norm_mae
    - type: rmse
      name: norm_rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: cross_domain_stable_trunk_pretraining
    load_from: ${env:MONASH_STAGE0_CKPT,dpm_budget_monash_warmup}
    load_method: stable_trunk_channel_inflate
    strict_load: false
    checkpoint:
      load_full_model: false
      skip_prefixes:
        - zed_router
        - zed_route_gate
        - zed_router_feat_adapter
    save_artifact: srd_xd_stable
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 4
    freeze:
    - all
    unfreeze:
    - stable_trunk.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: stable
      model_mode: stable_pretrain
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
      robust_stage1: true
      robust_lambda: 0.3
      robust_temperature: 1.0
      robust_ema_momentum: 0.95
      robust_use_standardized_risk: true
      robust_topk_groups: 0
      robust_group_key: graph
      robust_logsumexp_excess: true
      log_zed_metrics: true
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: cross_domain_residual_diffusion_pretraining
    save_artifact: srd_xd_diffusion
    load_from: srd_xd_stable
    strict_load: true
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 4
    freeze:
    - all
    unfreeze:
    - residual_event_encoder.*
    - diffusion_mechanism_learner.*
    - zed_router.*
    - zed_route_gate.*
    - zed_expert_adapters.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: diffusion
      model_mode: diffusion_pretrain
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
      log_zed_metrics: true
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0008
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: cross_domain_joint_refinement
    save_artifact: srd_xd_joint
    load_from: srd_xd_diffusion
    strict_load: true
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 2
    freeze:
    - all
    unfreeze:
    - residual_event_encoder.*
    - diffusion_mechanism_learner.*
    - zed_router.*
    - zed_route_gate.*
    - zed_expert_adapters.*
    - fusion_predictor.*
    - calibration_head.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
      log_zed_metrics: true
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0005
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 2
    validate_every: 1
    gradient_clip_val: 5.0
  - name: zed_zero_shot_checkpoint_materialize
    eval_only: true
    epochs: 0
    reset_data: true
    load_from: srd_xd_joint
    strict_load: true
    save_artifact: zed_zero_shot
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.2
      residual_weight: 0.2
      spectral_weight: 0.02
      spectral_scales:
      - 1
      use_revin: false
      log_zed_metrics: true
    losses:
    - type: mae
    metrics:
    - type: mae
    - type: rmse
  - name: metr_la_zero_shot
    eval_only: true
    epochs: 0
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: srd_xd_joint
    strict_load: true
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      use_revin: false
      primary_supervision_space: denormalized
      basicts_scale_logging: true
      log_zed_metrics: true
    losses:
    - type: mae
    metrics:
    - type: mae
    - type: rmse
  - name: metr_la_five_percent_mechanism_tuning
    epochs: 5
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: zed_zero_shot
    load_method: load_zed_zero_shot_backbone
    strict_load: false
    few_shot_ratio: 0.05
    freeze:
    - all
    unfreeze:
    - zed_fa_prompt_embed.*
    - zed_fa_prompt_proj.*
    - zed_fa_spatial_adapter.*
    - zed_fa_affine.*
    - zed_fa_router_bias
    - fusion_predictor.additive_logit
    - fusion_predictor.gate_net.*
    - calibration_head.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.0
      residual_weight: 0.1
      spectral_weight: 0.0
      cross_cov_weight: 0.0
      use_revin: false
      primary_supervision_space: denormalized
      basicts_scale_logging: true
      robust_stage1: false
      robust_lambda: 0.0
      log_zed_metrics: true
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 5
    validate_every: 1
    gradient_clip_val: 5.0
    save_best_by: val/metric/mae
    save_best: true
    early_stop_patience: 2
  - name: metr_la_ten_percent_mechanism_tuning
    epochs: 5
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: zed_zero_shot
    load_method: load_zed_zero_shot_backbone
    strict_load: false
    few_shot_ratio: 0.1
    freeze:
    - all
    unfreeze:
    - zed_fa_prompt_embed.*
    - zed_fa_prompt_proj.*
    - zed_fa_spatial_adapter.*
    - zed_fa_affine.*
    - zed_fa_router_bias
    - fusion_predictor.additive_logit
    - fusion_predictor.gate_net.*
    - calibration_head.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.0
      residual_weight: 0.1
      spectral_weight: 0.0
      cross_cov_weight: 0.0
      use_revin: false
      primary_supervision_space: denormalized
      basicts_scale_logging: true
      robust_stage1: false
      robust_lambda: 0.0
      log_zed_metrics: true
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 5
    validate_every: 1
    gradient_clip_val: 5.0
    save_best_by: val/metric/mae
    save_best: true
    early_stop_patience: 2
  - name: pems03_zero_shot
    eval_only: true
    epochs: 0
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: PEMS03
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: srd_xd_joint
    strict_load: true
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      use_revin: false
      primary_supervision_space: denormalized
      basicts_scale_logging: true
      log_zed_metrics: true
    losses:
    - type: mae
    metrics:
    - type: mae
    - type: rmse
  - name: pems03_five_percent_mechanism_tuning
    epochs: 5
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: PEMS03
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: zed_zero_shot
    load_method: load_zed_zero_shot_backbone
    strict_load: false
    few_shot_ratio: 0.05
    freeze:
    - all
    unfreeze:
    - zed_fa_prompt_embed.*
    - zed_fa_prompt_proj.*
    - zed_fa_spatial_adapter.*
    - zed_fa_affine.*
    - zed_fa_router_bias
    - fusion_predictor.additive_logit
    - fusion_predictor.gate_net.*
    - calibration_head.*
    task:
      type: StableResidualForecastingTaskV5
      log_stage2_per_domain: true
      dsd_routing_key: auto
      phase: joint
      model_mode: forecast
      stable_target: lowfreq
      final_weight: 1.0
      stable_weight: 0.0
      residual_weight: 0.1
      spectral_weight: 0.0
      cross_cov_weight: 0.0
      use_revin: false
      primary_supervision_space: denormalized
      basicts_scale_logging: true

  PEMS08:
    name: PEMS08
    data_path: data/PEMS08_BasicTS/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 8
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY_BasicTS/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 8
  PEMS03:
    name: PEMS03
    data_path: data/PEMS03_BasicTS/data.npz
    graph_path: data/PEMS03/adj.npz
    batch_size: 8
  australian_electricity_demand:
    name: australian_electricity_demand
    monash_root: data/Monash15/australian_electricity_demand
    batch_size: 4
  london_smart_meters:
    name: london_smart_meters
    monash_root: data/Monash15/london_smart_meters
    batch_size: 4
  solar_10_minutes:
    name: solar_10_minutes
    monash_root: data/Monash15/solar_10_minutes
    batch_size: 4
  solar_4_seconds:
    name: solar_4_seconds
    monash_root: data/Monash15/solar_4_seconds
    batch_size: 4
  wind_farms_minutely:
    name: wind_farms_minutely
    monash_root: data/Monash15/wind_farms_minutely
    batch_size: 4
  wind_4_seconds:
    name: wind_4_seconds
    monash_root: data/Monash15/wind_4_seconds
    batch_size: 4
  weather:
    name: weather
    monash_root: data/Monash15/weather
    batch_size: 4
  kdd_cup_2018:
    name: kdd_cup_2018
    monash_root: data/Monash15/kdd_cup_2018
    batch_size: 4
  temperature_rain:
    name: temperature_rain
    monash_root: data/Monash15/temperature_rain

dataset_groups:
  cross_domain_sharded_sources:
  - LargeST_xd_part0
  - LargeST_xd_part1
  - KnowAir
  - Weather
  - ETTm1
  monash15_sources:
  - australian_electricity_demand
  - london_smart_meters

# TimeLLM-GPT2-lite: non-graph LLM temporal **sanity** baseline (NOT a full Time-LLM reproduction).
# Maps per-node windows to ``inputs_embeds`` for a frozen GPT-2 core + trainable projector / prompts / head.
# Offline / no-HF: set ``model.backend: fallback_transformer``. GPT-2 path: ``pip install -e ".[llm]"`` (weights download once unless ``local_files_only: true`` with a local cache).

experiment_name: timellm_gpt2_lite_monash15_then_mixed_12_target_fewshot
seed: 42
trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/timellm_gpt2_lite_monash15_then_mixed_12_target_fewshot
  log_every: 50

  - temperature_rain
  - saugeenday
  - sunspot
  - pedestrian_counts
  - kaggle_web_traffic
  - bitcoin
  - us_births
data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 8
  split:
  - 0.7
  - 0.1
  - 0.2
  scaler:
    type: standard
model:
  type: TimeLLMGPT2Lite
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  max_num_nodes: 1024
  backend: gpt2
  gpt2_model_name: gpt2
  local_files_only: false
  num_prompt_tokens: 4
  freeze_backbone: true
  transformer_dim: 256
  transformer_layers: 4
  transformer_heads: 4
  transformer_ffn_mult: 4
  dropout: 0.1
pipeline:
  stages:
  - name: metr_la_5_percent_supervised
    epochs: 20
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    few_shot_ratio: 0.05
    freeze:
    - all
    unfreeze:
    - in_proj.*
    - prompt_tokens*
    - out_norm.*
    - head.*
    - pos_embed
    - fallback_encoder.*
    task:
      type: ForecastingTask
      primary_supervision_space: denormalized
      basicts_scale_logging: true
      use_revin: false
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 20
    validate_every: 1
    gradient_clip_val: 5.0
    save_best_by: val/metric/mae
    save_best: true

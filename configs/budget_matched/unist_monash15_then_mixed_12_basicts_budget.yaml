    name: kaggle_web_traffic
    monash_root: data/Monash15/kaggle_web_traffic
    batch_size: 4
  bitcoin:
    name: bitcoin
    monash_root: data/Monash15/bitcoin
    batch_size: 4
  us_births:
    name: us_births
    monash_root: data/Monash15/us_births
    batch_size: 4
dataset_groups:
  cross_domain_sharded_sources:
  - LargeST_xd_part0
  - LargeST_xd_part1
  - KnowAir
  - Weather
  - ETTm1
  monash15_sources:
  - australian_electricity_demand
  - london_smart_meters
  - solar_10_minutes
  - solar_4_seconds
  - wind_farms_minutely
  - wind_4_seconds
  - weather
  - kdd_cup_2018
  - temperature_rain
  - saugeenday
  - sunspot
  - pedestrian_counts
  - kaggle_web_traffic
  - bitcoin
  - us_births
data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 8
  split:
  - 0.7
  - 0.1
  - 0.2
  scaler:
    type: standard
model:
  type: UniSTFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  max_num_nodes: 1024
  hidden_dim: 128
  encoder_layers: 6
  decoder_layers: 4
  num_heads: 8
  ffn_dim: 256
  dropout: 0.1
  attention_mode: factorized
  use_prompt: false
  num_memory_spatial: 512
  num_memory_temporal: 512
pipeline:
  stages:
  - name: monash_temporal_warmup
    save_artifact: unist_monash15_warmup
    reset_data: true
    data:
      type: MonashMultiDatasetWindowDataModule
      dataset_group: monash15_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: identity
      norm_mode: instance_standard
    epochs: 4
    model:
      use_prompt: false
    task:
      type: MaskedReconstructionTask
      mask_ratio: 0.25
    losses:
    - type: mse
    metrics:
    - type: mae
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0
  - name: mixed_domain_masked_pretrain
    save_artifact: unist_xd_masked_trunk
    load_from: ${env:UNIST_MONASH15_CKPT,unist_monash15_warmup}
    load_method: foundation_channel_inflate
    strict_load: false
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 5
    task:
      type: MaskedReconstructionTask
      mask_ratio: 0.25
    losses:
    - type: mse
    metrics:
    - type: mae
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 5
    validate_every: 1
    gradient_clip_val: 5.0
    model:
      use_prompt: false
  - name: mixed_domain_prompt_source_adaptation
    save_artifact: unist_xd_prompt_source
    load_from: ${env:UNIST_MASKED_CKPT,unist_xd_masked_trunk}
    load_method: foundation_channel_inflate
    strict_load: false
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
      - 0.7
      - 0.1
      - 0.2
      scaler:
        type: standard
    epochs: 5
    task:
      type: MaskedForecastCompletionTask
      input_key: x
      target_key: y
      output_key: reconstruction
      model_mode: reconstruct
    losses:
    - type: mse
    metrics:
    - type: mae
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 5
    validate_every: 1
    gradient_clip_val: 5.0
    model:
      use_prompt: true
  - name: metr_la_zero_shot
    eval_only: true
    epochs: 0
    reset_data: true
    model:
      use_prompt: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: unist_xd_prompt_source
    strict_load: true
    task:
      type: MaskedForecastCompletionTask
      input_key: x
      target_key: y
      output_key: reconstruction
      model_mode: reconstruct
    losses:
    - type: mae
    metrics:
    - type: mae
    - type: rmse
  - name: metr_la_five_percent_prompt_tune
    epochs: 20
    reset_data: true
    model:
      use_prompt: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: unist_xd_prompt_source
    strict_load: false
    few_shot_ratio: 0.05
    freeze:
    - all
    unfreeze:
    - prompt.*
    - reconstruction_head.*
    task:
      type: MaskedForecastCompletionTask
      input_key: x
      target_key: y
      output_key: reconstruction
      model_mode: reconstruct
    losses:
    - type: mae
      weight: 1.0
    - type: mse
      weight: 0.05
    metrics:
    - type: mae
    - type: rmse
    optimizer:
      type: AdamW
      lr: 0.0003
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 20
    validate_every: 1
    gradient_clip_val: 5.0
    save_best_by: val/metric/mae
    save_best: true
  - name: metr_la_ten_percent_prompt_tune
    epochs: 20
    reset_data: true
    model:
      use_prompt: true
    data:
      type: WindowDataModule

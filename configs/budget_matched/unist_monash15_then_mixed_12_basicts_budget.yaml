# UniST budget-matched (legacy / high-capacity): 512/512 prompt memory; 50k+50k mixed updates; few-shot includes reconstruction_head.*.
# Fair main-table baseline: configs/budget_matched/unist_monash15_then_mixed_12_basicts_budget_lite.yaml  (UniST-lite).

experiment_name: unist_monash15_then_mixed_12_basicts_budget
seed: 42
trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/unist_monash15_then_mixed_12_basicts_budget
  log_every: 50
dataset_registry:
  LargeST_xd_part0:
    name: LargeST_xd_part0
    data_path: data/LargeST_xd_part0/data.npz
    graph_path: data/LargeST_xd_part0/adj.npz

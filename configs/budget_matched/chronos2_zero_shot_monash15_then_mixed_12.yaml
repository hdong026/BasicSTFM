# Chronos2-ZS sanity check: non-graph FM zero-shot (requires: pip install -e '.[chronos]').
# Uses ``basicstfm train`` eval_only stages (no separate evaluate subcommand).
# Default ``pretrained_model_id`` is a small T5 Chronos checkpoint; switch to amazon/chronos-2 with chronos-forecasting>=2.2 if desired.
# Input is StandardScaler-normalized traffic — expect domain gap vs Chronos pretraining.

experiment_name: chronos2_zero_shot_monash15_then_mixed_12
seed: 42
trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/chronos2_zero_shot_monash15_then_mixed_12
  log_every: 50
dataset_registry:
  LargeST_xd_part0:
    name: LargeST_xd_part0
    data_path: data/LargeST_xd_part0/data.npz
    graph_path: data/LargeST_xd_part0/adj.npz
    batch_size: 4
  LargeST_xd_part1:
    name: LargeST_xd_part1
    data_path: data/LargeST_xd_part1/data.npz

    monash_root: data/Monash15/sunspot
    batch_size: 4
  pedestrian_counts:
    name: pedestrian_counts
    monash_root: data/Monash15/pedestrian_counts
    batch_size: 4
  kaggle_web_traffic:
    name: kaggle_web_traffic
    monash_root: data/Monash15/kaggle_web_traffic
    batch_size: 4
  bitcoin:
    name: bitcoin
    monash_root: data/Monash15/bitcoin
    batch_size: 4
  us_births:
    name: us_births
    monash_root: data/Monash15/us_births
    batch_size: 4
dataset_groups:
  cross_domain_sharded_sources:
  - LargeST_xd_part0
  - LargeST_xd_part1
  - KnowAir
  - Weather
  - ETTm1
  monash15_sources:
  - australian_electricity_demand
  - london_smart_meters
  - solar_10_minutes
  - solar_4_seconds
  - wind_farms_minutely
  - wind_4_seconds
  - weather
  - kdd_cup_2018
  - temperature_rain
  - saugeenday
  - sunspot
  - pedestrian_counts
  - kaggle_web_traffic
  - bitcoin
  - us_births
data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 8
  split:
  - 0.7
  - 0.1
  - 0.2
  scaler:
    type: standard
model:
  type: Chronos2ZeroShotForecaster
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  pretrained_model_id: amazon/chronos-t5-small
  quantile_level: 0.5
pipeline:
  stages:
  - name: metr_la_chronos2_zero_shot
    eval_only: true
    epochs: 0
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
      - 0.6
      - 0.2
      - 0.2
      scaler:
        type: standard
      split_mode: basicts
    task:
      type: ForecastingTask
      model_mode: zero_shot
      primary_supervision_space: denormalized
      basicts_scale_logging: true
      use_revin: false
    losses:
    - type: mae
    metrics:
    - type: mae
    - type: rmse
  - name: pems03_chronos2_zero_shot

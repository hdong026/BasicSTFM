experiment_name: srd_stfm_joint_from_scratch
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/srd_stfm_joint_from_scratch
  log_every: 50

dataset_registry:
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 12
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 6
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 8
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 6

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: SRDSTFMBackbone
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 16
  diffusion_enabled: true

pipeline:
  stages:
    - name: joint_training_from_scratch
      save_artifact: srd_joint_scratch
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_keys: [PEMS-BAY, PEMS04, PEMS07]
        input_len: 12
        output_len: 12
        batch_size: 8
        train_strategy: proportional
        eval_strategy: per_dataset
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 8
      task:
        type: StableResidualForecastingTask
        phase: scratch
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 8
      validate_every: 1
      gradient_clip_val: 5.0

    - name: metr_la_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: srd_joint_scratch
      strict_load: true
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: metr_la_five_percent_mechanism_tuning
      epochs: 3
      load_from: srd_joint_scratch
      strict_load: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
        - fusion_predictor.*
        - calibration_head.*
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

experiment_name: unist_foundation_transfer
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/unist_foundation_transfer
  log_every: 50

data:
  type: WindowDataModule
  data_path: data/METR-LA/data.npz
  graph_path: data/METR-LA/adj.npz
  input_len: 24
  output_len: 12
  batch_size: 32
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: UniSTFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  encoder_layers: 6
  decoder_layers: 4
  num_heads: 8
  ffn_dim: 256
  use_prompt: true
  num_memory_spatial: 128
  num_memory_temporal: 128

pipeline:
  stages:
    - name: masked_spatiotemporal_pretrain
      epochs: 5
      task:
        type: MaskedReconstructionTask
        mask_ratio: 0.5
      losses:
        - type: mse
      metrics:
        - type: mae
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5
      validate_every: 1
      gradient_clip_val: 5.0

    - name: zero_shot_test
      eval_only: true
      epochs: 0
      load_from: previous
      strict_load: true
      task:
        type: ForecastingTask
        model_mode: zero_shot
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: five_percent_prompt_tuning
      epochs: 3
      load_from: previous
      strict_load: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - prompt.*
        - forecast_head.*
      task:
        type: ForecastingTask
        model_mode: prompt_forecast
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

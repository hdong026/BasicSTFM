experiment_name: unist_multisource_benchmark
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/unist_multisource_benchmark
  log_every: 20

dataset_registry:
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 10
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 4
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 6
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 4
  Rainfall_AUS:
    name: Rainfall_AUS
    data_path: data/Rainfall_AUS/data.npz
    batch_size: 8
  Rainfall_CN:
    name: Rainfall_CN
    data_path: data/Rainfall_CN/data.npz
    batch_size: 8
  Rainfall_SA:
    name: Rainfall_SA
    data_path: data/Rainfall_SA/data.npz
    batch_size: 8
  PEMS08:
    name: PEMS08
    data_path: data/PEMS08/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 8
  Rainfall_UK:
    name: Rainfall_UK
    data_path: data/Rainfall_UK/data.npz
    batch_size: 8
  Rainfall_USA:
    name: Rainfall_USA
    data_path: data/Rainfall_USA/data.npz
    batch_size: 8

dataset_groups:
  benchmark_sources:
    - METR-LA
    - PEMS-BAY
    - PEMS04
    - PEMS07
    - Rainfall_AUS
    - Rainfall_CN
    - Rainfall_SA
  held_out_targets:
    - PEMS08
    - Rainfall_UK
    - Rainfall_USA

data:
  type: WindowDataModule
  dataset_key: PEMS08
  input_len: 24
  output_len: 12
  batch_size: 8
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: UniSTFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  encoder_layers: 6
  decoder_layers: 4
  num_heads: 8
  ffn_dim: 256
  use_prompt: true
  num_memory_spatial: 128
  num_memory_temporal: 128

pipeline:
  stages:
    - name: masked_spatiotemporal_pretrain
      save_artifact: unist_multisource_pretrain
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: benchmark_sources
        input_len: 24
        output_len: 12
        batch_size: 4
        train_strategy: uniform
        eval_strategy: per_dataset
        steps_per_epoch: 500
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 5
      model:
        use_prompt: false
      task:
        type: MaskedReconstructionTask
        mask_ratio: 0.5
        mask_strategy: mixed
        mask_strategies: [random, temporal, tube, block]
      losses:
        - type: mse
      metrics:
        - type: mae
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5
      validate_every: 1
      gradient_clip_val: 5.0

    - name: pems08_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: PEMS08
        input_len: 24
        output_len: 12
        batch_size: 8
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: unist_multisource_pretrain
      load_method: load_backbone_weights
      strict_load: false
      model:
        use_prompt: true
      task:
        type: MaskedForecastCompletionTask
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: pems08_five_percent_prompt_tuning
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: PEMS08
        input_len: 24
        output_len: 12
        batch_size: 8
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: unist_multisource_pretrain
      load_method: load_backbone_weights
      strict_load: false
      model:
        use_prompt: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - prompt.*
        - reconstruction_head.*
      task:
        type: MaskedForecastCompletionTask
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0


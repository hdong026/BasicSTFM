# Same recipe as dpm_with_ettm.yaml, but ETTm datasets omit graph_path (no-graph ablation).
# Traffic datasets still use static road graphs.
experiment_name: dpm_with_ettm_nograph
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/dpm_with_ettm_nograph
  log_every: 30

dataset_registry:
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 12
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 6
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 8
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 6
  PEMS08:
    name: PEMS08
    data_path: data/PEMS08/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 8
  ETTm1:
    name: ETTm1
    data_path: data/ETTm1/data.npz
    graph_path: null
    batch_size: 16
  ETTm2:
    name: ETTm2
    data_path: data/ETTm2/data.npz
    graph_path: null
    batch_size: 16

dataset_groups:
  benchmark_sources:
    - PEMS-BAY
    - PEMS04
    - PEMS07
  pretrain_with_ettm:
    - PEMS-BAY
    - PEMS04
    - ETTm1
    - ETTm2
  held_out_targets:
    - METR-LA
    - PEMS08

data:
  type: WindowDataModule
  dataset_key: ETTm1
  input_len: 12
  output_len: 12
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: DPMV2Backbone
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 4
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true
  use_stable_graph_context: true
  stable_graph_num_layers: 1
  stable_graph_share_weights: false

pipeline:
  stages:
    - name: stable_trunk_pretraining
      save_artifact: dpm_v2_stable
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: pretrain_with_ettm
        input_len: 12
        output_len: 12
        batch_size: 8
        train_strategy: proportional
        eval_strategy: per_dataset
        split: [0.7, 0.1, 0.2]
        steps_per_epoch: 250
        scaler:
          type: standard
      epochs: 1
      freeze:
        - all
      unfreeze:
        - stable_trunk.*
      task:
        type: StableResidualForecastingTask
        phase: stable
        model_mode: stable_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 1
      validate_every: 1
      gradient_clip_val: 5.0

    - name: residual_diffusion_pretraining
      save_artifact: dpm_v2_diffusion
      load_from: dpm_v2_stable
      strict_load: true
      epochs: 1
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
      task:
        type: StableResidualForecastingTask
        phase: diffusion
        model_mode: diffusion_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0008
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 1
      validate_every: 1
      gradient_clip_val: 5.0

    - name: joint_refinement
      save_artifact: dpm_v2_joint
      load_from: dpm_v2_diffusion
      strict_load: true
      epochs: 1
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 1
      validate_every: 1
      gradient_clip_val: 5.0

    - name: ettm1_zero_shot_eval
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: ETTm1
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: dpm_v2_joint
      strict_load: true
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

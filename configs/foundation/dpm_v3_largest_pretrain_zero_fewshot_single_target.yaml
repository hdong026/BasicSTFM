experiment_name: dpm_v3_largest_transfer_single_target
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/dpm_v3_largest_transfer_single_target
  log_every: 50

dataset_registry:
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 16
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 16
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 16
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 16
  PEMS08:
    name: PEMS08
    data_path: data/PEMS08/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 16

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: DPMV3Backbone
  num_nodes: 1024
  input_dim: 3
  output_dim: 1
  input_len: 12
  output_len: 12
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 1
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true
  use_stable_graph_context: true
  stable_graph_num_layers: 1
  stable_graph_share_weights: false

pipeline:
  stages:
    - name: largest_graph_stable_trunk_pretraining
      save_artifact: dpm_v3_largest_stable
      reset_data: true
      data:
        type: PartitionedWindowDataModule
        name: LargeST
        data_path: data/LargeST_full/data.npy
        graph_path: data/LargeST_full/adj.npy
        input_len: 12
        output_len: 12
        batch_size: 4
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
        mmap_mode: r
        partition_size: 1024
        partition_strategy: graph_greedy
        scaler_fit_timesteps: 50000
        steps_per_epoch: 2048
        train_strategy: round_robin
      epochs: 2
      freeze:
        - all
      unfreeze:
        - stable_trunk.*
      task:
        type: StableResidualForecastingTaskV3
        phase: stable
        model_mode: stable_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
        robust_stage1: true
        robust_lambda: 0.3
        robust_temperature: 1.0
        robust_ema_momentum: 0.95
        robust_use_standardized_risk: true
        robust_topk_groups: 0
        robust_group_key: dataset
        log_aux_losses: true
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 2
      validate_every: 1
      gradient_clip_val: 5.0

    - name: largest_graph_residual_diffusion_pretraining
      save_artifact: dpm_v3_largest_diffusion
      load_from: dpm_v3_largest_stable
      strict_load: true
      epochs: 2
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
      task:
        type: StableResidualForecastingTask
        phase: diffusion
        model_mode: diffusion_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0008
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 2
      validate_every: 1
      gradient_clip_val: 5.0

    - name: largest_graph_joint_refinement
      save_artifact: dpm_v3_largest_joint
      load_from: dpm_v3_largest_diffusion
      strict_load: true
      epochs: 1
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 1
      validate_every: 1
      gradient_clip_val: 5.0

    - name: metr_la_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: dpm_v3_largest_joint
      strict_load: true
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: metr_la_five_percent_mechanism_tuning
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: dpm_v3_largest_joint
      strict_load: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
        - fusion_predictor.*
        - calibration_head.*
        - stable_trunk.forecast_head.*
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        cross_cov_weight: 0.0
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

    - name: pems_bay_zero_shot

experiment_name: factost_largest_transfer_single_target
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/factost_largest_transfer_single_target
  log_every: 50
  # Validation / test loops: print running metrics every N batches (current/total when length is known).
  eval_log_every: 50

dataset_registry:
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 16
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 16
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 16
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 16
  PEMS08:
    name: PEMS08
    data_path: data/PEMS08/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 16

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 96
  output_len: 12
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: FactoSTFoundationModel
  num_nodes: 1024
  input_dim: 3
  output_dim: 1
  input_len: 96
  output_len: 12
  patch_len: 12
  hidden_dim: 128
  num_layers: 3
  num_heads: 8
  ffn_dim: 256
  num_prompt_tokens: 3
  use_st_adapter: true

pipeline:
  stages:
    - name: largest_graph_universal_temporal_pretrain
      save_artifact: factost_largest_utp
      reset_data: true
      data:
        type: PartitionedWindowDataModule
        name: LargeST
        data_path: data/LargeST_full/data.npy
        graph_path: data/LargeST_full/adj.npy
        input_len: 96
        output_len: 12
        batch_size: 4
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
        mmap_mode: r
        partition_size: 1024
        partition_strategy: graph_greedy
        scaler_fit_timesteps: 50000
        # null: sum of per-partition loader lengths (InterleavedNamedLoaders default — full schedule vs fixed 2048).
        steps_per_epoch: null
        train_strategy: round_robin
      epochs: 5
      model:
        use_st_adapter: false
      task:
        type: JointReconstructionForecastTask
        mask_ratio: 0.5
        mask_strategy: random
        reconstruction_weight: 1.0
        forecast_weight: 1.0
        reconstruction_spectral_weight: 0.1
        forecast_spectral_weight: 0.1
        spectral_scales: [1, 2, 4]
      losses:
        - type: mse
      metrics:
        - type: mae
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5
      validate_every: 1
      gradient_clip_val: 5.0

    - name: metr_la_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 96
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: factost_largest_utp
      strict_load: true
      model:
        use_st_adapter: false
      task:
        type: ForecastingTask
        model_mode: zero_shot
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: metr_la_five_percent_factorized_adapter
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 96
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: factost_largest_utp
      load_method: load_backbone_weights
      strict_load: false
      model:
        use_st_adapter: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - prompt_*
        - st_*
        - metadata_gate.*
        - forecast_head.*
      task:
        type: ForecastingTask
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0


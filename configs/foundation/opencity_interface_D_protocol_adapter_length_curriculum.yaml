experiment_name: opencity_interface_D_protocol_adapter_length_curriculum
seed: 42

custom_imports:
  - basicstfm_ext

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/opencity_interface_D_protocol_adapter_length_curriculum
  log_every: 50

dataset_registry:
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 10
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 6
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 6
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 4
  PEMS08:
    name: PEMS08
    data_path: data/PEMS08/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 8

dataset_groups:
  benchmark_sources:
    - PEMS-BAY
    - PEMS04
    - PEMS07

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 24
  output_len: 24
  batch_size: 12
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: OpenCityProtocolAdapterWrapper
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  backbone_cfg:
    input_len: 12
    output_len: 12
    hidden_dim: 128
    num_layers: 4
    num_heads: 4
    ffn_dim: 256
    dropout: 0.1
  adapter_cfg:
    input_backend: cross_attention
    output_backend: query_attention
    hidden_dim: 64
    bottleneck_dim: 16
    num_heads: 4
    num_layers: 1
    dropout: 0.05
    residual_scale_init: 0.001
    enable_conditioning: true
    debug_shapes: false
  calibration_cfg:
    source_datasets: [PEMS-BAY, PEMS04, PEMS07]
    embedding_dim: 32
    stats_hidden_dim: 64
    descriptor_cache_path: runs/opencity_interface_D_protocol_adapter_length_curriculum/descriptor_cache.pt
    descriptor_momentum: 0.9
    use_graph_stats: true
    use_spectral_stats: true
    enable_conditioning: true
    input_conditioning: true
    output_conditioning: true
    input_strength: 1.0
    output_strength: 0.35
  distill_cfg:
    teacher_source: backbone
    lambda_distill_matched: 0.05
    lambda_identity_in: 0.02
    lambda_identity_out: 0.02
    distill_only_when_matched: true
    identity_only_when_matched: true
  regularization_cfg:
    source_datasets: [PEMS-BAY, PEMS04, PEMS07]
    lambda_ortho: 0.001
    lambda_red: 0.001
    lambda_adv: 0.0

pipeline:
  stages:
    - name: multisource_protocol_pretrain
      save_artifact: opencity_D_curriculum_pretrain
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: benchmark_sources
        input_len: 24
        output_len: 24
        batch_size: 6
        train_strategy: proportional
        eval_strategy: per_dataset
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 5
      task:
        type: ProtocolForecastingTask
        input_length_choices: [12, 24]
        output_length_choices: [6, 12, 24]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5
      validate_every: 1
      gradient_clip_val: 5.0

    - name: metr_la_24_to_12_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 24
        output_len: 12
        batch_size: 12
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: opencity_D_curriculum_pretrain
      load_method: checkpoint
      strict_load: true
      task:
        type: ProtocolForecastingTask
        dataset_name: METR-LA
        model_mode: zero_shot
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: metr_la_24_to_12_five_percent_tuning
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 24
        output_len: 12
        batch_size: 12
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: opencity_D_curriculum_pretrain
      load_method: checkpoint
      strict_load: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - input_protocol_adapter.*
        - output_query_decoder.*
        - calibration.*
        - backbone.forecast_head.*
      task:
        type: ProtocolForecastingTask
        dataset_name: METR-LA
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

    - name: pems08_12_to_24_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: PEMS08
        input_len: 12
        output_len: 24
        batch_size: 10
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: opencity_D_curriculum_pretrain
      load_method: checkpoint
      strict_load: true
      task:
        type: ProtocolForecastingTask
        dataset_name: PEMS08
        model_mode: zero_shot
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: pems08_12_to_24_five_percent_tuning
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: PEMS08
        input_len: 12
        output_len: 24
        batch_size: 10
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: opencity_D_curriculum_pretrain
      load_method: checkpoint
      strict_load: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - input_protocol_adapter.*
        - output_query_decoder.*
        - calibration.*
        - backbone.forecast_head.*
      task:
        type: ProtocolForecastingTask
        dataset_name: PEMS08
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

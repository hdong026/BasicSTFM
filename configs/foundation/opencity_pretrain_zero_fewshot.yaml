experiment_name: opencity_foundation_transfer
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/opencity_foundation_transfer
  log_every: 50

data:
  type: WindowDataModule
  data_path: data/METR-LA/data.npz
  graph_path: data/METR-LA/adj.npz
  input_len: 12
  output_len: 12
  batch_size: 32
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: OpenCityFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  ffn_dim: 256
  dropout: 0.1

pipeline:
  stages:
    - name: graph_temporal_pretrain
      epochs: 5
      task:
        type: ForecastingTask
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5
      validate_every: 1
      gradient_clip_val: 5.0

    - name: zero_shot_test
      eval_only: true
      epochs: 0
      load_from: previous
      strict_load: true
      task:
        type: ForecastingTask
        model_mode: zero_shot
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: five_percent_few_shot_finetune
      epochs: 3
      load_from: previous
      strict_load: true
      few_shot_ratio: 0.05
      task:
        type: ForecastingTask
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

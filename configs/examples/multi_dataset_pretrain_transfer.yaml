experiment_name: multi_dataset_pretrain_transfer_demo
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/multi_dataset_pretrain_transfer_demo
  log_every: 20

data:
  type: WindowDataModule
  data_path: data/METR-LA/data.npz
  graph_path: data/METR-LA/adj.npz
  input_len: 12
  output_len: 12
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: OpenCityFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  ffn_dim: 256

pipeline:
  stages:
    - name: multi_dataset_pretrain
      save_artifact: shared_backbone
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        input_len: 12
        output_len: 12
        batch_size: 16
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 400
        datasets:
          - name: METR-LA
            data_path: data/METR-LA/data.npz
            graph_path: data/METR-LA/adj.npz
          - name: PEMS-BAY
            data_path: data/PEMS-BAY/data.npz
            graph_path: data/PEMS-BAY/adj.npz
      epochs: 5
      task:
        type: MaskedReconstructionTask
        mask_ratio: 0.3
        mask_strategy: mixed
        mask_strategies: [random, temporal, tube, block]
      losses:
        - type: mse
      metrics:
        - type: mae
      optimizer:
        type: AdamW
        lr: 0.001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5

    - name: zero_shot_target
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        data_path: data/METR-LA/data.npz
        graph_path: data/METR-LA/adj.npz
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: shared_backbone
      task:
        type: ForecastingTask
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: five_percent_target_tuning
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        data_path: data/METR-LA/data.npz
        graph_path: data/METR-LA/adj.npz
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: shared_backbone
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - forecast_head.*
      task:
        type: ForecastingTask
      losses:
        - type: mae
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
      scheduler:
        type: CosineAnnealingLR
        T_max: 3

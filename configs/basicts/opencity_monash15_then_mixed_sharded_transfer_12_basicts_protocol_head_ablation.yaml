data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 8
  split:
    - 0.7
    - 0.1
    - 0.2
  scaler:
    type: standard

model:
  type: OpenCityFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  max_num_nodes: 1024
  hidden_dim: 128
  num_layers: 3
  num_heads: 4
  ffn_dim: 256
  dropout: 0.1

pipeline:
  stages:
  - name: monash_temporal_warmup
    save_artifact: opencity_monash15_warmup
    reset_data: true
    data:
      type: MonashMultiDatasetWindowDataModule
      dataset_group: monash15_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
        - 0.7
        - 0.1
        - 0.2
      scaler:
        type: identity
      norm_mode: instance_standard
    epochs: 4
    task:
      type: ForecastingTask
      primary_supervision_space: normalized
    losses:
      - type: mae
        weight: 1.0
      - type: mse
        weight: 0.05
    metrics:
      - type: mae
      - type: rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 4
    validate_every: 1
    gradient_clip_val: 5.0

  - name: mixed_domain_pretrain
    save_artifact: opencity_xd_mixed
    load_from: ${env:OPENCITY_MONASH15_CKPT,opencity_monash15_warmup}
    load_method: foundation_channel_inflate
    strict_load: false
    reset_data: true
    data:
      type: MultiDatasetWindowDataModule
      dataset_group: cross_domain_sharded_sources
      input_len: 12
      output_len: 12
      num_workers: 2
      train_strategy: round_robin
      eval_strategy: per_dataset
      steps_per_epoch: 10000
      max_val_windows: 256
      max_test_windows: 512
      split:
        - 0.7
        - 0.1
        - 0.2
      scaler:
        type: standard
    epochs: 10
    task:
      type: ForecastingTask
    losses:
      - type: mae
        weight: 1.0
      - type: mse
        weight: 0.05
    metrics:
      - type: mae
      - type: rmse
    optimizer:
      type: AdamW
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      type: CosineAnnealingLR
      T_max: 10
    validate_every: 1
    gradient_clip_val: 5.0

  - name: metr_la_zero_shot
    eval_only: true
    epochs: 0
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
        - 0.6
        - 0.2
        - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: opencity_xd_mixed
    strict_load: true
    task:
      type: ForecastingTask
      model_mode: zero_shot
      primary_supervision_space: denormalized
      basicts_scale_logging: true
    losses:
      - type: mae
    metrics:
      - type: mae
      - type: rmse

  - name: metr_la_five_percent_finetune
    epochs: 3
    reset_data: true
    data:
      type: WindowDataModule
      dataset_key: METR-LA
      input_len: 12
      output_len: 12
      batch_size: 8
      split:
        - 0.6
        - 0.2
        - 0.2
      scaler:
        type: standard
      split_mode: basicts
    load_from: opencity_xd_mixed
    strict_load: true
    few_shot_ratio: 0.05
    freeze:
      - all
    unfreeze:
      - forecast_head.*
      - blocks.2.*
      - norm.weight
      - norm.bias
    task:
      type: ForecastingTask
      primary_supervision_space: denormalized
      basicts_scale_logging: true
    losses:
      - type: mae
        weight: 1.0
      - type: mse
        weight: 0.05
    metrics:
      - type: mae
      - type: rmse
    optimizer:

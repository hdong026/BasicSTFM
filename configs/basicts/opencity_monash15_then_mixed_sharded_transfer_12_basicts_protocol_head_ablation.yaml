# OpenCity ablation: head + last block (blocks.2) + final LayerNorm (num_layers=3).

# OpenCity (adapter) — Monash-15 warmup -> mixed-domain pretrain -> BasicTS traffic transfer (12/12).
# Traffic arrays: data/<DATASET>_BasicTS/data.npz (StandardScaler + split_mode basicts + original-scale metrics).
# Graphs: data/<DATASET>/adj.npz
#
# Optional: point stage-2 load to an external Monash warmup checkpoint:
#   export OPENCITY_MONASH15_CKPT=/path/to/opencity_monash15_warmup_last.pt
# and replace stage ``monash_temporal_warmup`` with a single load-only stage if desired.

experiment_name: opencity_monash15_then_mixed_sharded_transfer_12_basicts_protocol_head_ablation
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/opencity_monash15_then_mixed_sharded_transfer_12_basicts_protocol_head_ablation
  log_every: 50


# Monash-15 temporal stable-law pretraining (DPM-SR, N=C=1 identity graph).
# Data: scripts/data/prepare_monash15.py -> data/Monash15/<name>/
# Artifact: checkpoints/monash_temporal_stable_law_pretraining_last.pt (save_artifact: monash_stable_trunk)

experiment_name: dpm_sr_monash15_stable_pretrain_12
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/dpm_sr_monash15_stable_pretrain_12
  log_every: 50

dataset_registry:
  australian_electricity_demand:
    name: australian_electricity_demand
    monash_root: data/Monash15/australian_electricity_demand
    batch_size: 4
  london_smart_meters:
    name: london_smart_meters
    monash_root: data/Monash15/london_smart_meters
    batch_size: 4
  solar_10_minutes:
    name: solar_10_minutes
    monash_root: data/Monash15/solar_10_minutes
    batch_size: 4
  solar_4_seconds:
    name: solar_4_seconds
    monash_root: data/Monash15/solar_4_seconds
    batch_size: 4
  wind_farms_minutely:
    name: wind_farms_minutely
    monash_root: data/Monash15/wind_farms_minutely
    batch_size: 4
  wind_4_seconds:
    name: wind_4_seconds
    monash_root: data/Monash15/wind_4_seconds
    batch_size: 4
  weather:
    name: weather
    monash_root: data/Monash15/weather
    batch_size: 4
  kdd_cup_2018:
    name: kdd_cup_2018
    monash_root: data/Monash15/kdd_cup_2018
    batch_size: 4
  temperature_rain:
    name: temperature_rain
    monash_root: data/Monash15/temperature_rain
    batch_size: 4
  saugeenday:
    name: saugeenday
    monash_root: data/Monash15/saugeenday
    batch_size: 4
  sunspot:
    name: sunspot
    monash_root: data/Monash15/sunspot
    batch_size: 4
  pedestrian_counts:
    name: pedestrian_counts
    monash_root: data/Monash15/pedestrian_counts
    batch_size: 4
  kaggle_web_traffic:
    name: kaggle_web_traffic
    monash_root: data/Monash15/kaggle_web_traffic
    batch_size: 4
  bitcoin:
    name: bitcoin
    monash_root: data/Monash15/bitcoin
    batch_size: 4
  us_births:
    name: us_births
    monash_root: data/Monash15/us_births
    batch_size: 4
  weather_smoke:
    name: weather_smoke
    monash_root: data/Monash15_smoke/weather
    batch_size: 4
  australian_electricity_demand_smoke:
    name: australian_electricity_demand_smoke
    monash_root: data/Monash15_smoke/australian_electricity_demand
    batch_size: 4
  bitcoin_smoke:
    name: bitcoin_smoke
    monash_root: data/Monash15_smoke/bitcoin
    batch_size: 4

dataset_groups:
  monash15_smoke_sources:
    - weather_smoke
    - australian_electricity_demand_smoke
    - bitcoin_smoke
  monash15_sources:
    - australian_electricity_demand
    - london_smart_meters
    - solar_10_minutes
    - solar_4_seconds
    - wind_farms_minutely
    - wind_4_seconds
    - weather
    - kdd_cup_2018
    - temperature_rain
    - saugeenday
    - sunspot
    - pedestrian_counts
    - kaggle_web_traffic
    - bitcoin
    - us_births

data:
  type: MonashMultiDatasetWindowDataModule
  dataset_group: monash15_sources
  input_len: 12
  output_len: 12
  batch_size: 4
  split: [0.7, 0.1, 0.2]
  scaler:
    type: identity
  norm_mode: instance_standard

model:
  type: SRDSTFMBackbone
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 15
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true

pipeline:
  stages:
    - name: monash_temporal_stable_law_pretraining
      save_artifact: monash_stable_trunk
      reset_data: true
      data:
        type: MonashMultiDatasetWindowDataModule
        dataset_group: monash15_sources
        input_len: 12
        output_len: 12
        num_workers: 2
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 10000
        max_val_windows: 256
        max_test_windows: 512
        split: [0.7, 0.1, 0.2]
        scaler:
          type: identity
        norm_mode: instance_standard
      epochs: 4
      freeze:
        - all
      unfreeze:
        - stable_trunk.*
      task:
        type: StableResidualForecastingTask
        phase: stable
        model_mode: stable_pretrain
        primary_supervision_space: normalized
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
          name: norm_mae
        - type: mse
          weight: 0.05
          name: norm_mse
      metrics:
        - type: mae
          name: norm_mae
        - type: rmse
          name: norm_rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 4
      validate_every: 1
      gradient_clip_val: 5.0

# Monash temporal pretrain (Stage0) -> traffic sharded ST pretrain (Stages I–III) -> downstream transfer.
# Fork: FactoST-aligned protocol — standard scaler + value-channel RevIN on all downstream targets;
# ST benchmarks use factost_original_scale=true; TS (ETTh2/Weather/Electricity) use false (FactoST original_scale mapping).
# Prerequisites: data shards (build_largest_cross_domain_shards.py) + Monash-15 (scripts/data/prepare_monash15.py).
# Stage I loads Monash stable trunk: set MONASH_STAGE0_CKPT or rely on default path to monash_temporal_stable_law_pretraining_last.pt
# P0 downstream: val/test full split (no max_val_windows caps on target eval).

experiment_name: dpm_sr_monash15_then_traffic_sharded_transfer_96_factost_protocol
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/dpm_sr_monash15_then_traffic_sharded_transfer_96_factost_protocol
  log_every: 50

dataset_registry:
  LargeST_xd_part0:
    name: LargeST_xd_part0
    data_path: data/LargeST_xd_part0/data.npz
    graph_path: data/LargeST_xd_part0/adj.npz
    batch_size: 4
  LargeST_xd_part1:
    name: LargeST_xd_part1
    data_path: data/LargeST_xd_part1/data.npz
    graph_path: data/LargeST_xd_part1/adj.npz
    batch_size: 4

    data_path: data/Weather/data.npz
    graph_path: data/Weather/adj.npz
    batch_size: 4
  ETTm1:
    name: ETTm1
    data_path: data/ETTm1/data.npz
    graph_path: data/ETTm1/adj.npz
    batch_size: 4
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 8
  PEMS04:
    name: PEMS04
    data_path: data/PEMS04/data.npz
    graph_path: data/PEMS04/adj.npz
    batch_size: 8
  PEMS07:
    name: PEMS07
    data_path: data/PEMS07/data.npz
    graph_path: data/PEMS07/adj.npz
    batch_size: 8
  PEMS08:
    name: PEMS08
    data_path: data/PEMS08/data.npz
    graph_path: data/PEMS08/adj.npz
    batch_size: 8
  PEMS-BAY:
    name: PEMS-BAY
    data_path: data/PEMS-BAY/data.npz
    graph_path: data/PEMS-BAY/adj.npz
    batch_size: 8
  Electricity:
    name: Electricity
    data_path: data/Electricity/data.npz
    graph_path: data/Electricity/adj.npz
    batch_size: 8
  ETTh2:
    name: ETTh2
    data_path: data/ETTh2/data.npz
    graph_path: data/ETTh2/adj.npz
    batch_size: 8

dataset_groups:
  cross_domain_sharded_sources:
    - LargeST_xd_part0
    - LargeST_xd_part1
    - KnowAir
    - Weather
    - ETTm1

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 96
  output_len: 96
  batch_size: 8
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: SRDSTFMBackbone
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 5
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true

# --- Shared MultiDataset data recipe (repeated in each pretrain stage for clarity) ---
# Source pretrain: max_val_windows=256, max_test_windows=512
# (Quick-run caps; val/test *split* remains 0.1/0.2 of timesteps, then subset to at most N windows.)

pipeline:
  stages:
    - name: cross_domain_stable_trunk_pretraining
      load_from: ${env:MONASH_STAGE0_CKPT,runs/dpm_sr_monash15_stable_pretrain_96/checkpoints/monash_temporal_stable_law_pretraining_last.pt}
      load_method: stable_trunk_channel_inflate
      strict_load: false
      save_artifact: srd_xd_stable
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: cross_domain_sharded_sources
        input_len: 96
        output_len: 96
        num_workers: 2
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 10000
        max_val_windows: 256
        max_test_windows: 512
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 4
      freeze:
        - all
      unfreeze:
        - stable_trunk.*
      task:
        type: StableResidualForecastingTask
        phase: stable
        model_mode: stable_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 4
      validate_every: 1
      gradient_clip_val: 5.0

    - name: cross_domain_residual_diffusion_pretraining
      save_artifact: srd_xd_diffusion
      load_from: srd_xd_stable
      strict_load: true
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: cross_domain_sharded_sources
        input_len: 96
        output_len: 96
        num_workers: 2
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 10000
        max_val_windows: 256
        max_test_windows: 512
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 4
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
      task:
        type: StableResidualForecastingTask
        phase: diffusion
        model_mode: diffusion_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0008
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 4
      validate_every: 1
      gradient_clip_val: 5.0

    - name: cross_domain_joint_refinement
      save_artifact: srd_xd_joint
      load_from: srd_xd_diffusion
      strict_load: true
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: cross_domain_sharded_sources
        input_len: 96
        output_len: 96
        num_workers: 2
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 10000
        max_val_windows: 256
        max_test_windows: 512
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 2
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 2
      validate_every: 1
      gradient_clip_val: 5.0

    # ---- Targets: zero-shot (eval) + 5% few-shot (train). Add ten_percent_* stages by copying *_five_* with few_shot_ratio: 0.1. ----

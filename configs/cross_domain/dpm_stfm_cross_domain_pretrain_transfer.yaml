# SRD-STFM backbone (SRDSTFMBackbone) — DPM family without the v2 graph stable trunk
# (legacy naming: dpm_stfm in configs/foundation). Same three-stage DPM training as
# foundation/dpm_stfm_pretrain_zero_fewshot, with cross-domain sources and round_robin
# mixing. DiffusionModulation still uses num_datasets matching source count.

experiment_name: dpm_stfm_cross_domain_pretrain_transfer
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/dpm_stfm_cross_domain_pretrain_transfer
  log_every: 50

dataset_registry:
  LargeST:
    name: LargeST
    data_path: data/LargeST/data.npz
    graph_path: data/LargeST/adj.npz
    batch_size: 1
    max_train_windows: 10000
  KnowAir:
    name: KnowAir
    data_path: data/KnowAir/data.npz
    graph_path: data/KnowAir/adj.npz
    batch_size: 4
    max_train_windows: 80000
  Weather:
    name: Weather
    data_path: data/Weather/data.npz
    graph_path: data/Weather/adj.npz
    batch_size: 8
    max_train_windows: 60000
  ETTm1:
    name: ETTm1
    data_path: data/ETTm1/data.npz
    graph_path: data/ETTm1/adj.npz
    batch_size: 8
    max_train_windows: 50000
  ETTm2:
    name: ETTm2
    data_path: data/ETTm2/data.npz
    graph_path: data/ETTm2/adj.npz
    batch_size: 8
    max_train_windows: 50000
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 16

dataset_groups:
  cross_domain_sources:
    - LargeST
    - KnowAir
    - Weather
    - ETTm1
  cross_domain_sources_plus_ettm2:
    - LargeST
    - KnowAir
    - Weather
    - ETTm1
    - ETTm2
  held_out_transfer_target:
    - METR-LA

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 12
  output_len: 12
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: SRDSTFMBackbone
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  hidden_dim: 128
  residual_mode: forecast
  fusion_mode: additive
  use_frequency_branch: true
  num_datasets: 4
  diffusion_enabled: true
  use_inertia_gate: true
  use_attenuation_gate: true

pipeline:
  stages:
    - name: cross_domain_stable_trunk_pretraining
      save_artifact: srd_xd_stable
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: cross_domain_sources
        input_len: 12
        output_len: 12
        num_workers: 2
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 1000
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 2
      freeze:
        - all
      unfreeze:
        - stable_trunk.*
      task:
        type: StableResidualForecastingTask
        phase: stable
        model_mode: stable_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 2
      validate_every: 1
      gradient_clip_val: 5.0

    - name: cross_domain_residual_diffusion_pretraining
      save_artifact: srd_xd_diffusion
      load_from: srd_xd_stable
      strict_load: true
      epochs: 2
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
      task:
        type: StableResidualForecastingTask
        phase: diffusion
        model_mode: diffusion_pretrain
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0008
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 2
      validate_every: 1
      gradient_clip_val: 5.0

    - name: cross_domain_joint_refinement
      save_artifact: srd_xd_joint
      load_from: srd_xd_diffusion
      strict_load: true
      epochs: 1
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        spectral_scales: [1]
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 1
      validate_every: 1
      gradient_clip_val: 5.0

    - name: metr_la_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: srd_xd_joint
      strict_load: true
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: metr_la_five_percent_mechanism_tuning
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 12
        output_len: 12
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: srd_xd_joint
      strict_load: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - residual_event_encoder.*
        - diffusion_mechanism_learner.*
        - fusion_predictor.*
        - calibration_head.*
        - stable_trunk.forecast_head.*
      task:
        type: StableResidualForecastingTask
        phase: joint
        model_mode: forecast
        stable_target: lowfreq
        final_weight: 1.0
        stable_weight: 0.2
        residual_weight: 0.2
        spectral_weight: 0.02
        cross_cov_weight: 0.0
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0

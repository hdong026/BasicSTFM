# FactoST — cross-domain UTP (adapter off), then METR-LA zero-shot and 5% few-shot
# with the factorized ST adapter. Aligned to foundation/factost_multisource_benchmark
# but on the large cross-domain source mix and 96-96 windows.

experiment_name: factost_cross_domain_pretrain_transfer
seed: 42

trainer:
  type: MultiStageTrainer
  device: auto
  work_dir: runs/factost_cross_domain_pretrain_transfer
  log_every: 50

dataset_registry:
  LargeST:
    name: LargeST
    data_path: data/LargeST/data.npz
    graph_path: data/LargeST/adj.npz
    batch_size: 1
    max_train_windows: 10000
  KnowAir:
    name: KnowAir
    data_path: data/KnowAir/data.npz
    graph_path: data/KnowAir/adj.npz
    batch_size: 4
    max_train_windows: 80000
  Weather:
    name: Weather
    data_path: data/Weather/data.npz
    graph_path: data/Weather/adj.npz
    batch_size: 8
    max_train_windows: 60000
  ETTm1:
    name: ETTm1
    data_path: data/ETTm1/data.npz
    graph_path: data/ETTm1/adj.npz
    batch_size: 8
    max_train_windows: 50000
  ETTm2:
    name: ETTm2
    data_path: data/ETTm2/data.npz
    graph_path: data/ETTm2/adj.npz
    batch_size: 8
    max_train_windows: 50000
  METR-LA:
    name: METR-LA
    data_path: data/METR-LA/data.npz
    graph_path: data/METR-LA/adj.npz
    batch_size: 16

dataset_groups:
  cross_domain_sources:
    - LargeST
    - KnowAir
    - Weather
    - ETTm1
  held_out_transfer_target:
    - METR-LA

data:
  type: WindowDataModule
  dataset_key: METR-LA
  input_len: 96
  output_len: 96
  batch_size: 16
  split: [0.7, 0.1, 0.2]
  scaler:
    type: standard

model:
  type: FactoSTFoundationModel
  num_nodes: auto
  input_dim: auto
  output_dim: auto
  input_len: auto
  output_len: auto
  patch_len: 12
  hidden_dim: 128
  num_layers: 3
  num_heads: 8
  ffn_dim: 256
  num_prompt_tokens: 3
  use_st_adapter: true

pipeline:
  stages:
    - name: factost_universal_temporal_pretrain
      save_artifact: factost_xd_utp
      reset_data: true
      data:
        type: MultiDatasetWindowDataModule
        dataset_group: cross_domain_sources
        input_len: 96
        output_len: 96
        num_workers: 2
        train_strategy: round_robin
        eval_strategy: per_dataset
        steps_per_epoch: 1000
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      epochs: 5
      model:
        use_st_adapter: false
      task:
        type: JointReconstructionForecastTask
        mask_ratio: 0.5
        mask_strategy: random
        reconstruction_weight: 1.0
        forecast_weight: 1.0
        reconstruction_spectral_weight: 0.1
        forecast_spectral_weight: 0.1
        spectral_scales: [1, 2, 4]
      losses:
        - type: mse
      metrics:
        - type: mae
      optimizer:
        type: AdamW
        lr: 0.001
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 5
      validate_every: 1
      gradient_clip_val: 5.0

    - name: metr_la_zero_shot
      eval_only: true
      epochs: 0
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 96
        output_len: 96
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: factost_xd_utp
      strict_load: true
      model:
        use_st_adapter: false
        output_dim: 1
      task:
        type: ForecastingTask
        model_mode: zero_shot
      losses:
        - type: mae
      metrics:
        - type: mae
        - type: rmse

    - name: metr_la_five_percent_factorized_adapter
      epochs: 3
      reset_data: true
      data:
        type: WindowDataModule
        dataset_key: METR-LA
        input_len: 96
        output_len: 96
        batch_size: 16
        split: [0.7, 0.1, 0.2]
        scaler:
          type: standard
      load_from: factost_xd_utp
      load_method: load_backbone_weights
      strict_load: false
      model:
        use_st_adapter: true
      few_shot_ratio: 0.05
      freeze:
        - all
      unfreeze:
        - prompt_*
        - st_*
        - metadata_gate.*
        - forecast_head.*
      task:
        type: ForecastingTask
      losses:
        - type: mae
          weight: 1.0
        - type: mse
          weight: 0.05
      metrics:
        - type: mae
        - type: rmse
      optimizer:
        type: AdamW
        lr: 0.0005
        weight_decay: 0.0001
      scheduler:
        type: CosineAnnealingLR
        T_max: 3
      validate_every: 1
      gradient_clip_val: 5.0
